<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Placement Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { min-height: 100vh; display: flex; flex-direction: column; background: #f8f9fa; }
        main { flex: 1; padding: 1.5rem 0; }
        .navbar-brand { font-weight: 700; }
        .card { box-shadow: 0 0.125rem 0.25rem rgba(0,0,0,.075); }
        .stat-card { transition: transform 0.1s; }
        .stat-card:hover { transform: translateY(-2px); }
    </style>
</head>
<body>
    <div id="app">
        <div class="container py-5 text-center">
            <p class="text-muted">Loading Placement Portal...</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vue-router@4/dist/vue-router.global.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/api.js') }}"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    <script>
      setTimeout(function() {
        var el = document.getElementById('app');
        if (el && el.textContent.indexOf('Loading') >= 0) {
          el.innerHTML = '<div class="container py-5"><div class="alert alert-warning">App failed to load. Check browser console (F12) for errors. Ensure Flask is running and try <a href="">refreshing</a>.</div></div>';
        }
      }, 8000);
    </script>
</body>
</html>
